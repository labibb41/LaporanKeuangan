services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_CHANNEL: stderr
      DB_HOST: host.docker.internal
      DB_PORT: 3306
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:80"
    volumes:
      - app-storage:/var/www/html/storage
      - app-database:/var/www/html/database

volumes:
  app-storage:
  app-database: